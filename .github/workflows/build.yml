name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Release, Debug]

    # The default preset targets Visual Studio 2026, which GitHub-hosted runners
    # may not have yet. CI uses the generator-agnostic `ninja` preset instead so
    # it works on any image that ships an MSVC toolchain.
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-bincache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Configure vcpkg env
        shell: pwsh
        run: |
          # ilammy/msvc-dev-cmd runs vcvarsall.bat which sets VCPKG_ROOT to the
          # VS-bundled vcpkg (no manifest-mode bootstrap). Override it to the
          # runner's standalone vcpkg install, which is kept current and supports
          # manifest mode out of the box.
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
          Write-Host "Using vcpkg at $env:VCPKG_INSTALLATION_ROOT"

      - name: Fetch vcpkg baseline commit
        shell: pwsh
        run: |
          # vcpkg.json pins a specific builtin-baseline. The runner's vcpkg clone
          # may not contain that commit yet, so fetch it before configure.
          $baseline = (Get-Content vcpkg.json | ConvertFrom-Json)."builtin-baseline"
          if (-not $baseline) {
              Write-Host "No builtin-baseline pinned - skipping fetch"
              exit 0
          }
          Write-Host "Fetching vcpkg baseline $baseline into $env:VCPKG_INSTALLATION_ROOT"
          git -C "$env:VCPKG_INSTALLATION_ROOT" fetch --depth=1 origin $baseline

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ninja -DCMAKE_BUILD_TYPE=${{ matrix.configuration }}

      - name: Build
        run: cmake --build build/ninja

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfse-template-plugin-${{ matrix.configuration }}
          path: |
            build/ninja/*.dll
            build/ninja/*.pdb
          if-no-files-found: error
